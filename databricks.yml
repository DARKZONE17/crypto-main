bundle:
  name: crypto_pipeline

include:
  - notebooks/*

variables:
  env:
    default: dev
  kafka_topic:
    default: dev_crypto-topic
  kafka_topic_dlq:
    default: dev_crypto-dlq

resources:
  jobs:
    crypto_etl_job:
      name: crypto-etl-job-${var.env}

      tasks:
        - task_key: producer

          python_file_task:
            python_file: notebooks/ws_producer.py

          environment_variables:
            KAFKA_TOPIC: ${var.kafka_topic}
            KAFKA_TOPIC_DLQ: ${var.kafka_topic_dlq}